<!-- Card 2: Disciplinas -->
                        <div class="perfil-card">
                            <div class="perfil-card-header">
                                <div class="perfil-card-icone perfil-icone-disciplinas">
                                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                                        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                                    </svg>
                                </div>
                                <h2 class="perfil-card-titulo">Disciplinas que Leciono</h2>
                            </div>

                            <!-- Tags das disciplinas selecionadas -->
                            <div class="perfil-disciplinas-tags" id="perfilDisciplinasTags"></div>

                            <!-- ═══ SELETOR VISUAL DAS DISCIPLINAS DA ESCOLA ═══ -->
                            <div class="perfil-disc-seletor-wrap">
                                <div class="perfil-disc-seletor-titulo">
                                    <span>Selecione da lista da escola</span>
                                    <small>Clique para marcar/desmarcar</small>
                                </div>
                                <div class="disc-sel-grid" id="seletorDisciplinasGrid">
                                    <!-- preenchido via JS com as disciplinas da escola -->
                                </div>
                            </div>

                            <!-- Adicionar disciplina personalizada -->
                            <div class="perfil-disc-custom-wrap">
                                <div class="perfil-disc-seletor-titulo">
                                    <span>Ou adicione uma personalizada</span>
                                </div>
                                <div class="perfil-disciplina-add">
                                    <input
                                        type="text"
                                        id="perfilDiscIcone"
                                        placeholder="🎯"
                                        maxlength="4"
                                        class="perfil-input perfil-input-emoji"
                                        title="Emoji da disciplina"
                                    />
                                    <input
                                        class="perfil-input"
                                        type="text"
                                        id="perfilDisciplinaInput"
                                        placeholder="Ex: Teatro, Xadrez, Música..."
                                        maxlength="40"
                                        onkeydown="if(event.key==='Enter'){adicionarDisciplinaProfessorCustom();}"
                                    />
                                    <button class="perfil-btn perfil-btn-outline-sm" onclick="adicionarDisciplinaProfessorCustom()">
                                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                                        </svg>
                                        Adicionar
                                    </button>
                                </div>
                            </div>

                            <button class="perfil-btn perfil-btn-primario" style="margin-top:14px" onclick="salvarDisciplinas()">
                                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                                    <polyline points="17 21 17 13 7 13 7 21"/>
                                    <polyline points="7 3 7 8 15 8"/>
                                </svg>
                                Salvar disciplinas
                            </button>
                        </div>
