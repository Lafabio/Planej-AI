<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planejador de Aulas - SESI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loadingOverlay" class="hidden">Carregando...</div>

    <div id="authContainer" class="login-container">
        <div class="login-box">
            <h1 id="authTitle">Acessar Sistema</h1>
            
            <div id="loginForm">
                <input type="email" id="loginEmail" placeholder="Email" required>
                <input type="password" id="loginPassword" placeholder="Senha" required>
                <button class="btn-login" onclick="fazerLogin()">Entrar</button>
                <p onclick="mostrarRecuperacao()" class="link-auth">Esqueci minha senha</p>
                <p onclick="mostrarCadastro()" class="link-auth">Criar nova conta</p>
            </div>

            <div id="registerForm" class="hidden">
                <input type="text" id="regNome" placeholder="Seu Nome">
                <input type="text" id="regEscola" placeholder="Nome da Escola">
                <input type="email" id="regEmail" placeholder="Email">
                <input type="password" id="regPassword" placeholder="Senha (mín. 6 caracteres)">
                <button class="btn-login" onclick="fazerCadastro()">Cadastrar</button>
                <p onclick="mostrarLogin()" class="link-auth">Já tenho conta</p>
            </div>

            <div id="resetForm" class="hidden">
                <p>Insira seu email para recuperar a senha:</p>
                <input type="email" id="resetEmail" placeholder="Email">
                <button class="btn-login" onclick="iniciarRecuperacao()">Enviar Link</button>
                <p onclick="mostrarLogin()" class="link-auth">Voltar ao login</p>
            </div>
        </div>
    </div>

    <div id="appContainer" class="hidden">
        <header style="background:#0047B6; color:white; padding:15px; display:flex; justify-content:space-between; align-items:center;">
            <div>
                <strong id="userName">Professor</strong> | <small id="userSchool">Escola</small>
            </div>
            <div>
                <button onclick="abrirConfiguracaoHorario()" style="cursor:pointer; background:rgba(255,255,255,0.2); border:none; color:white; padding:8px 15px; border-radius:5px;">⚙️ Configurar Grade</button>
                <button onclick="fazerLogout()" style="cursor:pointer; margin-left:10px;">Sair</button>
            </div>
        </header>

        <main style="padding:20px;">
            <div id="gradeSemana"></div>
        </main>
    </div>

    <div id="modalHorario" class="modal hidden">
        <div class="modal-content">
            <h3>Configurar Grade da Escola</h3>
            <div class="form-group">
                <label>Horário de Início:</label>
                <input type="time" id="cfgInicio" value="07:30">
            </div>
            <div class="form-group">
                <label>Duração da Aula (min):</label>
                <input type="number" id="cfgDuracao" value="50">
            </div>
            <div class="form-group">
                <label>Total de Aulas:</label>
                <input type="number" id="cfgNumAulas" value="6">
            </div>
            <div class="form-group">
                <label>Recreio após qual aula?</label>
                <input type="number" id="cfgAulaRecreio" value="3">
            </div>
            <div class="form-group">
                <label>Duração Recreio (min):</label>
                <input type="number" id="cfgDuracaoRecreio" value="20">
            </div>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button onclick="salvarConfiguracoesEscola()" style="flex:1; background:#2E7D32; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer;">Salvar</button>
                <button onclick="fecharModalHorario()" style="flex:1; cursor:pointer;">Cancelar</button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
